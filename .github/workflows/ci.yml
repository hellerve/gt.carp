name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Carp
        uses: carpentry-org/setup-carp@v1

      - name: Run tests
        continue-on-error: true
        run: |
          set -euo pipefail
          make
          mkdir -p archive/gt.carp
          ln -sfn "$(pwd)/bin" archive/gt.carp/bin
          carp -x examples/print.carp
